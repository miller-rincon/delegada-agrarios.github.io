<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Mapa Interactivo – Defensoría</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
}
#map { width: 100%; height: 100%; }

/* ================= FILTROS ================= */
#filterBar {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 8px 10px;
  border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  z-index: 9999;
  width: 780px;
  max-width: 96%;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
#filterBar h2 {
  margin: 0;
  padding: 4px;
  background: #003469;
  color: white;
  font-size: 14px;
  text-align: center;
  border-radius: 6px;
}
.filtros-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
}
#filterBar select,
#filterBar button {
  height: 28px;
  font-size: 12px;
  padding: 4px;
  border-radius: 6px;
}
#filterBar select { width: 135px; }
#filterBar button {
  background: #003469;
  color: white;
  border: none;
  cursor: pointer;
}
#toggleFiltersBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 10000;
  padding: 6px 11px;
  background: #003469;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

/* ================= POPUPS ================= */
.popup-flotante {
  position: absolute;
  background: white;
  padding: 10px;
  border: 2px solid #003469;
  border-radius: 8px;
  z-index: 9999;
  min-width: 280px;
  font-size: 11px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  cursor: move;
  user-select: none;
}
.popup-header {
  display: flex;
  align-items: center;
  gap: 8px;
}
.popup-header img { height: 38px; }
.popup-title {
  font-size: 11px;
  font-weight: bold;
  line-height: 1.2;
}
.popup-line {
  border-top: 1px solid #003469;
  margin: 6px 0;
}
.btn-cerrar {
  position: absolute;
  top: 4px;
  right: 6px;
  cursor: pointer;
  font-weight: bold;
  color: #003469;
}
</style>
</head>

<body>

<button id="toggleFiltersBtn">Ocultar filtros</button>

<div id="filterBar">
  <h2>Distribución Regional</h2>
  <div class="filtros-row">
    <select id="filterLider"><option value="">Líder</option></select>
    <select id="filterProfesional"><option value="">Profesional</option></select>
    <select id="filterDepartamento"><option value="">Departamento</option></select>
    <select id="filterMunicipio"><option value="">Municipio</option></select>
    <button id="btnLimpiarFiltros">Limpiar</button>
  </div>
</div>

<div id="map"></div>

/* ================= FUNCIONES ================= */
function getCodigoMunicipio(f) {
  return f.properties?.MPIO_CCNCT?.toString().padStart(5,"0");
}
function buscarEntidad(cod) {
  return entidades.find(e => e.cod_municipio === cod);
}

/* Función para cerrar todos los popups (usada al limpiar filtros) */
function cerrarTodosLosPopups() {
  while (popupsActivos.length > 0) {
    const item = popupsActivos.pop();
    if (item.popup && item.popup.parentNode) item.popup.remove();
    if (item.line) map.removeLayer(item.line);
    map.off('move zoom', item.actualizar);
  }
}

/* ================= POPUP ================= */
function crearPopup(entidad, latlng) {
  const div = document.createElement("div");
  div.className = "popup-flotante";
  let html = `
    <div class="btn-cerrar">✕</div>
    <div class="popup-header">
      <img src="https://www.defensoria.gov.co/o/defensoria-del-pueblo-theme/html/assets/img/home/2022_06-16_logo_DPC_home-desktop.svg">
      <div class="popup-title">
        Defensoría Delegada para los Asuntos Agrarios,<br>
        Territorialidades y Derechos del Campesinado
      </div>
    </div>
    <div class="popup-line"></div>
  `;
  if (entidad) {
    html += `
      <b>${entidad.municipio}, ${entidad.departamento}</b><br>
      <b>Líder:</b> ${entidad.lider}
      <div class="popup-line"></div>
      <ul>
        ${entidad.profesionales.map(p =>
          `<li>${p.profesional} – ${p.celular} – ${p.correo}</li>`
        ).join("")}
      </ul>
    `;
  } else {
    html += `<i>Sin información registrada</i>`;
  }
  div.innerHTML = html;
  document.body.appendChild(div);

  const pt = map.latLngToContainerPoint(latlng);
  div.style.left = (pt.x + 30) + "px";
  div.style.top = (pt.y - 30) + "px";

  const line = L.polyline([latlng, latlng], { color:"#003469", weight:3 }).addTo(map);

  function actualizarLinea() {
    if (!div.parentNode) return;
    const popupCenter = [
      div.offsetLeft + div.clientWidth / 2,
      div.offsetTop + div.clientHeight / 2
    ];
    const popupLatLng = map.containerPointToLatLng(popupCenter);
    line.setLatLngs([latlng, popupLatLng]);
  }

  // Actualizar línea al mover/zoom mapa
  map.on("move zoom", actualizarLinea);

  // Hacer draggable el popup
  let isDragging = false;
  let offset = [0, 0];

  div.onmousedown = (e) => {
    if (e.target.className === "btn-cerrar") return;
    isDragging = true;
    offset = [div.offsetLeft - e.clientX, div.offsetTop - e.clientY];
    e.preventDefault();
  };

  document.onmousemove = (e) => {
    if (isDragging) {
      div.style.left = (e.clientX + offset[0]) + "px";
      div.style.top = (e.clientY + offset[1]) + "px";
      actualizarLinea();
    }
  };

  document.onmouseup = () => {
    isDragging = false;
  };

  // Botón cerrar
  div.querySelector(".btn-cerrar").onclick = () => {
    div.remove();
    map.removeLayer(line);
    map.off("move zoom", actualizarLinea);
    const index = popupsActivos.findIndex(i => i.popup === div);
    if (index > -1) popupsActivos.splice(index, 1);
  };

  // Guardar referencias
  popupsActivos.push({
    popup: div,
    line: line,
    actualizar: actualizarLinea
  });

  setTimeout(actualizarLinea, 50);
}

/* ================= SHAPES ================= */
fetch("https://raw.githubusercontent.com/caticoa3/colombia_mapa/master/co_2018_MGN_MPIO_POLITICO.geojson")
.then(r=>r.json())
.then(data=>{
  capaMunicipios = L.geoJson(data,{
    style:f=>{
      const c=getCodigoMunicipio(f);
      return municipiosColoreados[c]
        ? {color:"#333",weight:1,fillColor:municipiosColoreados[c],fillOpacity:.7}
        : {color:"#777",weight:.4,fillColor:"#e0e0e0",fillOpacity:.25};
    },
    onEachFeature:(f,l)=>{
      l.on("click",e=>crearPopup(buscarEntidad(getCodigoMunicipio(f)), e.latlng));
      l.bindTooltip(f.properties.MPIO_CNMBR,{sticky:true});
    }
  }).addTo(map);

  aplicarFiltrosMapa();
});

/* ================= FILTROS DINÁMICOS ================= */
const sL=document.getElementById("filterLider");
const sP=document.getElementById("filterProfesional");
const sD=document.getElementById("filterDepartamento");
const sM=document.getElementById("filterMunicipio");

function unique(a){return [...new Set(a)].sort();}

function entidadesFiltradas(){
  return entidades.filter(e=>{
    if(sL.value && e.lider!==sL.value) return false;
    if(sD.value && e.departamento!==sD.value) return false;
    if(sM.value && e.municipio!==sM.value) return false;
    if(sP.value && !e.profesionales.some(p=>p.profesional===sP.value)) return false;
    return true;
  });
}

function actualizarSelects(){
  const ef = entidadesFiltradas();
  function fill(sel, vals, label){
    const v=sel.value;
    sel.innerHTML=`<option value="">${label}</option>`;
    unique(vals).forEach(x=>sel.add(new Option(x,x)));
    if(vals.includes(v)) sel.value=v;
  }
  fill(sL, ef.map(e=>e.lider), "Líder");
  fill(sD, ef.map(e=>e.departamento), "Departamento");
  fill(sM, ef.map(e=>e.municipio), "Municipio");
  fill(sP, ef.flatMap(e=>e.profesionales.map(p=>p.profesional)), "Profesional");
}

function aplicarFiltrosMapa(){
  if(!capaMunicipios) return;
  actualizarSelects();
  capaMunicipios.eachLayer(l=>{
    const ent = buscarEntidad(getCodigoMunicipio(l.feature));
    if(!sL.value && !sP.value && !sD.value && !sM.value){
      l.setStyle({opacity:1,fillOpacity:municipiosColoreados[getCodigoMunicipio(l.feature)]?.7:.25});
    } else if(ent && entidadesFiltradas().includes(ent)){
      l.setStyle({opacity:1,fillOpacity:.75});
    } else {
      l.setStyle({opacity:0,fillOpacity:0});
    }
  });
}

[sL,sP,sD,sM].forEach(s=>s.addEventListener("change", aplicarFiltrosMapa));

document.getElementById("btnLimpiarFiltros").onclick=()=>{
  sL.value="";sP.value="";sD.value="";sM.value="";
  aplicarFiltrosMapa();
  cerrarTodosLosPopups(); // ← Nuevo: cierra todos los popups al limpiar filtros
};

actualizarSelects();

/* ================= TOGGLE ================= */
let filtrosVisibles=true;
document.getElementById("toggleFiltersBtn").onclick=function(){
  filtrosVisibles=!filtrosVisibles;
  document.getElementById("filterBar").style.display=filtrosVisibles?"block":"none";
  this.textContent=filtrosVisibles?"Ocultar filtros":"Mostrar filtros";
};
</script>
